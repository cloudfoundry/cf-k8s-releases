logCacheApi:
  certificateSecret: ""
  cfAuthProxy:
    image:
      repository: ghcr.io/cloudfoundry/k8s/cf-auth-proxy
      tag: ""
      imagePullPolicy: IfNotPresent
  gateway:
    image:
      repository: ghcr.io/cloudfoundry/k8s/gateway
      tag: ""
      imagePullPolicy: IfNotPresent
  nats:
    address: nats.{{ .Release.Namespace }}.svc.cluster.local:4222
  nodeSelector: ~
  tolerations: ~

routeRegistrar:
  image:
    repository: ghcr.io/cloudfoundry/k8s/route-registrar
    # renovate: dataSource=github-releases depName=cloudfoundry/routing-release
    tag: "0.387.0"
    imagePullPolicy: IfNotPresent
  resources: ~

logCacheBackend:
  systemDomain: "cf.127-0-0-1.nip.io"
  certificateSecret: ""
  syslogServer:
    image:
      repository: ghcr.io/cloudfoundry/k8s/syslog-server
      tag: ""
      imagePullPolicy: IfNotPresent
  logCache:
    image:
      repository: ghcr.io/cloudfoundry/k8s/log-cache
      tag: ""
      imagePullPolicy: IfNotPresent
  nodeSelector: ~
  tolerations: ~
