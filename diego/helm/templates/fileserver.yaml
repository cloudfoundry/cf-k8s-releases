{{- if .Values.fileserver.enabled }}
---
kind: Service
apiVersion: v1
metadata:
  name: fileserver
  labels:
    app.kubernetes.io/name: fileserver
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: fileserver
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fileserver
  labels:
    app.kubernetes.io/name: fileserver
  annotations:
    checksum/config: {{ include (print $.Template.BasePath "/fileserver-config.yaml") . | sha256sum }}
spec:
  # This is a singleton.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: fileserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fileserver
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/fileserver-config.yaml") . | sha256sum }}
    spec:
      containers:
        - name: nginx
          image: {{ .Values.fileserver.image.repository }}:{{ default .Chart.Version .Values.fileserver.image.tag }}
          imagePullPolicy: {{ .Values.fileserver.image.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          {{- range $key, $val := .Values.fileserver.buildpacks }}
            - name: {{ $key }}
              mountPath: /fileserver/{{ $key }}
          {{- end }}
          {{- if .Values.fileserver.resources }}
          resources:
            {{- toYaml .Values.fileserver.resources | nindent 12 }}
          {{- end }}
      {{- if .Values.fileserver.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.fileserver.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.fileserver.tolerations }}
      tolerations:
        {{- toYaml .Values.fileserver.tolerations | nindent 8 }}
      {{- end }}
      volumes:
        - name: nginx-config
          configMap:
            name: fileserver-config
        {{- range $key, $val := .Values.fileserver.buildpacks }}
        - name: {{ $key }}
          image:
            reference: {{ $val.image }}:{{ $val.tag }}
            pullPolicy: IfNotPresent
        {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fileserver
spec:
  parentRefs:
    - name: istio-gateway
  hostnames:
    - "{{ .Values.fileserver.hostname }}"
  rules:
    - backendRefs:
        - name: fileserver
          port: 8080
{{- end }}