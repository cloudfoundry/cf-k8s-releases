name: Release dotnet-core Buildpack

on:
  push:
    branches:
      - main
    paths:
      - 'dotnet-core-buildpack/docker-bake.hcl'
      
env:
  REGISTRY_PREFIX: ghcr.io/cloudfoundry/k8s/


jobs:
  dotnet-core-buildpack-release:
    runs-on: [self-hosted, solinas]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Determine Versions
        working-directory: dotnet-core-buildpack
        run: |
          echo "VERSION=$(docker buildx bake --print | jq -r '.target | to_entries[] | .value.tags[]' | grep -v ':latest$' | head -n1 | awk -F: '{print $NF}')" >> $GITHUB_ENV
      - name: Release Images
        working-directory: dotnet-core-buildpack
        run: |
          # Check if image available
          if docker pull $REGISTRY_PREFIX/dotnet-core-buildpack:$VERSION > /dev/null 2>&1; then
             echo "dotnet-core-buildpack image already exists in version $VERSION."
          else
            docker buildx bake --set '*.platform=linux/amd64,linux/arm64' #--push
          fi
