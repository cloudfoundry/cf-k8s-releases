name: Matrix Image Build

on:
  workflow_call:
    inputs:
      target:
        description: "Target to build"
        required: true
        type: string
      registry-prefix:
        description: "Registry prefix for the built images"
        required: false
        type: string
        default: ghcr.io/cloudfoundry/k8s/
  workflow_dispatch:
    inputs:
      target:
        description: "Target to build"
        required: true
        type: string
      registry-prefix:
        description: "Registry prefix for the built images"
        required: false
        type: string
        default: ghcr.io/cloudfoundry/k8s/

env:
  REGISTRY_PREFIX: ${{ inputs.registry-prefix }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build-images: ${{ steps.determine-target.outputs.build-images }}
    steps:
      - uses: actions/checkout@v7
      - name: Determine target
        id: determine-target
        working-directory: ${{ inputs.target }}
        run: |
          echo "build-images=false" >> $GITHUB_OUTPUT

          TARGET=${{ inputs.target }}
          TAGS=$(docker buildx bake "$TARGET" --print --progress quiet | jq -r '.target | keys | join(" ")')
          VERSION=$(yq e '.appVersion' helm/Chart.yaml)

          echo "Building target: $TARGET (resolved targets: $TAGS)"
          for TAG in $TAGS; do
            IMAGE="${REGISTRY_PREFIX}${TAG}:${VERSION}"

            if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
              echo "$IMAGE already exists."
            else
              echo "$IMAGE is missing. At least one image is missing, so all targets will be built."
              echo "build-images=true" >> $GITHUB_OUTPUT
              break
            fi
          done
  build:
    if: needs.prepare.outputs.build-images == 'true'
    needs: prepare
    outputs:
      digest-amd64: ${{ steps.export.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.export.outputs.digest-arm64 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            image: ubuntu-24.04
          - platform: linux/arm64
            image: ubuntu-24.04-arm
    runs-on: ["${{ matrix.image }}"]
    permissions:
      id-token: write
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: bake
        working-directory: ${{ inputs.target }}
        run: |
          TARGET="${{ inputs.target }}"
          BAKE_CONFIG=$(docker buildx bake "$TARGET" --print --progress quiet)
          RESOLVED_TARGETS=$(jq -r '.target | keys[]' <<< "$BAKE_CONFIG")

          SET_ARGS=()
          for RESOLVED_TARGET in $RESOLVED_TARGETS; do
            IMAGE=$(jq -r --arg t "$RESOLVED_TARGET" '.target[$t].tags[0] | split(":")[0]' <<< "$BAKE_CONFIG")
            SET_ARGS+=(--set "$RESOLVED_TARGET.output=type=image,name=$IMAGE,push-by-digest=true,name-canonical=true,push=true")
          done

          docker buildx bake "$TARGET" \
            "${SET_ARGS[@]}" \
            --set "*.platform=${{ matrix.platform }}" \
            --metadata-file ${{ runner.temp }}/metadata.json "$TARGET"
      - name: Export digest
        id: export
        run: |
          PLATFORM=$(echo ${{ matrix.platform }} | cut -d'/' -f2)
          DIGESTS=$(jq -c 'map_values(."containerimage.digest")' ${{ runner.temp }}/metadata.json)
          echo "Digests: $DIGESTS"
          echo "digest-$PLATFORM=$(echo $DIGESTS | base64 -w 0)" >> $GITHUB_OUTPUT
  merge:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      packages: write
    needs:
      - prepare
      - build
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Prepare tags
        id: tags
        working-directory: ${{ inputs.target }}
        run: |
          TAGS_DATA=$(docker buildx bake "${{ inputs.target }}" --print --progress quiet | \
            jq -c '
              .target | to_entries |
              map({
                name: .key,
                tags: .value.tags,
                image: (.value.tags[0] | split(":")[0])
              })')

          echo "Tags data: $TAGS_DATA"
          echo "tags=$TAGS_DATA" >> $GITHUB_OUTPUT
      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        env:
          AMD64_DIGESTS: ${{ needs.build.outputs.digest-amd64 }}
          ARM64_DIGESTS: ${{ needs.build.outputs.digest-arm64 }}
          TAGS_DATA: ${{ steps.tags.outputs.tags }}
        run: |
          TARGETS=$(jq -r '.[].name' <<< "$TAGS_DATA")
          AMD64_DIGESTS=$(echo "$AMD64_DIGESTS" | base64 -d)
          ARM64_DIGESTS=$(echo "$ARM64_DIGESTS" | base64 -d)

          echo "AMD64 Digests: $AMD64_DIGESTS"
          echo "ARM64 Digests: $ARM64_DIGESTS"

          for target in $TARGETS; do
            echo "--- Processing target: $target ---"

            TAGS=$(jq -r --arg t "$target" '.[] | select(.name == $t) | .tags | join(",")' <<< "$TAGS_DATA")
            IMAGE=$(jq -r --arg t "$target" '.[] | select(.name == $t) | .image' <<< "$TAGS_DATA")
            AMD64=$(jq -r --arg t "$target" '.[$t]' <<< "$AMD64_DIGESTS")
            ARM64=$(jq -r --arg t "$target" '.[$t]' <<< "$ARM64_DIGESTS")

            echo "  Image: $IMAGE"
            echo "  Tags: $TAGS"
            echo "  AMD64 digest: $AMD64"
            echo "  ARM64 digest: $ARM64"

            docker buildx imagetools create \
              $(tr ',' '\n' <<< "$TAGS" | sed 's/^/-t /') \
              "${IMAGE}@${AMD64}" "${IMAGE}@${ARM64}"
          done
