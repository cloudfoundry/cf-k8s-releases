name: Release routing

on:
  push:
    branches:
      - main
    paths:
      - 'routing/helm/Chart.yaml'
      
env:
  REGISTRY_PREFIX: ghcr.io/cloudfoundry/k8s/
  HELM_REGISTRY_PREFIX: ghcr.io/cloudfoundry/helm/


jobs:
  routing-release:
    runs-on: [self-hosted, solinas]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Determine Versions
        working-directory: routing
        run: |
          echo "VERSION=$(cat helm/Chart.yaml | yq e '.version')" >> GITHUB_ENV
      - name: Release Images
        working-directory: routing
        run: |
          # Check if image available
          if docker pull $REGISTRY_PREFIX/gorouter:$VERSION > /dev/null 2>&1; then
             echo "gorouter image already exists in version $VERSION."
          else
            docker buildx bake --set '*.platform=linux/amd64,linux/arm64' #--push
          fi
      - name: Publish Helm Chart
        working-directory: routing
        run: |
          # Check if chart available
          if helm show chart oci://$HELM_REGISTRY_PREFIX/routing --version $VERSION > /dev/null 2>&1; then
             echo "Helm chart already exists in version $VERSION."
          else
            helm package ./helm -d ${{ runner.temp }}
            # helm push ${{ runner.temp }}/routing-*.tgz oci://$HELM_REGISTRY_PREFIX/
          fi
